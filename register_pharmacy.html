<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Registration - Ayur</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 700px;">
            <h2>Pharmacy Registration</h2>
            <p>Register your pharmacy to reach more customers</p>
            <div class="alert alert-info">
                <strong>Note:</strong> Your registration will be verified by our admin team before approval.
            </div>
            
            <form id="pharmacyRegForm" action="backend/auth/register.php" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="role" value="pharmacy">
                
                <h4 class="mt-3 mb-2">Pharmacy Information</h4>
                
                <div class="form-group">
                    <label for="name" class="form-label">Pharmacy Name *</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="drug_license_number" class="form-label">Drug License Number *</label>
                    <input type="text" id="drug_license_number" name="drug_license_number" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="owner_name" class="form-label">Owner Name *</label>
                    <input type="text" id="owner_name" name="owner_name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="address" class="form-label">Address *</label>
                    <textarea id="address" name="address" class="form-control" rows="3" required></textarea>
                </div>
                
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address *</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone" class="form-label">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" class="form-control" required>
                    </div>
                </div>
                
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="password" class="form-label">Password *</label>
                        <input type="password" id="password" name="password" class="form-control" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm Password *</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="operating_hours" class="form-label">Operating Hours</label>
                    <input type="text" id="operating_hours" name="operating_hours" class="form-control" placeholder="e.g., 8 AM - 10 PM, Daily">
                </div>
                
                <h4 class="mt-3 mb-2">Verification Documents</h4>
                
                <div class="form-group">
                    <label for="license_document" class="form-label">Drug License Document *</label>
                    <input type="file" id="license_document" name="license_document" class="form-control" accept="image/*,.pdf" required>
                    <small class="form-help">Upload your drug license. Max size: 5MB</small>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit for Verification</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem;">
                Already have an account? <a href="login.html">Login here</a>
            </p>
            
            <p style="text-align: center; margin-top: 0.5rem;">
                <a href="register.html">← Choose Different Role</a>
            </p>
        </div>
    </div>
    
    <script src="assets/js/validation.js"></script>
</body>
</html>
